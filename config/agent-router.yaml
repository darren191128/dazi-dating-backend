# 智能体路由配置
# 云壹作为主代理，根据触发条件调用不同子代理

router:
  # 默认处理：云壹(CEO助理)
  default_agent: "云壹"
  
  # @方式触发
  mention_triggers:
    "@项目经理": "云贰"
    "@产品经理": "云叁"
    "@UI设计师": "云肆"
    "@前端工程师": "云伍"
    "@后端工程师": "云陆"
    "@测试工程师": "云柒"
    "@云贰": "云贰"
    "@云叁": "云叁"
    "@云肆": "云肆"
    "@云伍": "云伍"
    "@云陆": "云陆"
    "@云柒": "云柒"
  
  # 关键词触发
  keyword_triggers:
    # 项目经理 - 云贰
    "项目": "云贰"
    "进度": "云贰"
    "排期": "云贰"
    "计划": "云贰"
    "里程碑": "云贰"
    "风险": "云贰"
    
    # 产品经理 - 云叁
    "需求": "云叁"
    "产品": "云叁"
    "功能": "云叁"
    "用户": "云叁"
    "PRD": "云叁"
    "原型": "云叁"
    
    # UI设计师 - 云肆
    "设计": "云肆"
    "UI": "云肆"
    "UX": "云肆"
    "界面": "云肆"
    "视觉": "云肆"
    "交互": "云肆"
    "配色": "云肆"
    
    # 前端工程师 - 云伍
    "前端": "云伍"
    "页面": "云伍"
    "组件": "云伍"
    "React": "云伍"
    "Vue": "云伍"
    "CSS": "云伍"
    "响应式": "云伍"
    
    # 后端工程师 - 云陆
    "后端": "云陆"
    "API": "云陆"
    "接口": "云陆"
    "数据库": "云陆"
    "架构": "云陆"
    "服务": "云陆"
    "性能": "云陆"
    "优化": "云陆"
    
    # 测试工程师 - 云柒
    "测试": "云柒"
    "Bug": "云柒"
    "质量": "云柒"
    "用例": "云柒"
    "自动化": "云柒"
    "验收": "云柒"

  # 复杂任务模式（需要多角色协作）
  complex_tasks:
    patterns:
      - "开发.*功能"
      - "新.*项目"
      - "搭建.*系统"
      - "优化.*性能"
    workflow:
      - agent: "云叁"
        task: "需求分析"
      - agent: "云肆"
        task: "设计输出"
      - agent: "云伍"
        task: "前端开发"
      - agent: "云陆"
        task: "后端开发"
      - agent: "云柒"
        task: "测试验收"
