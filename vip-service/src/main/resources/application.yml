spring:
  application:
    name: vip-service
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
  datasource:
    url: jdbc:mysql://localhost:3306/dazi_dating?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  redis:
    host: localhost
    port: 6379
    database: 0

server:
  port: 8009

# VIP配置
vip:
  # 非VIP每日滑动次数限制
  daily-swipe-limit: 20
  # VIP每日超级喜欢次数
  vip-super-like-daily: 3
